services:
  backend:
    build:
      context: ./backend
    environment:
      SHOGEN_APP_NAME: ${SHOGEN_APP_NAME:-Shogen Backend}
      SHOGEN_ENVIRONMENT: ${SHOGEN_ENVIRONMENT:-local}
      SHOGEN_HOST: ${SHOGEN_HOST:-0.0.0.0}
      SHOGEN_PORT: ${SHOGEN_PORT:-8000}
      SHOGEN_LOG_LEVEL: ${SHOGEN_LOG_LEVEL:-INFO}
      SHOGEN_DATABASE_URL: ${SHOGEN_DATABASE_URL:-postgresql+psycopg://shogen:shogen@postgres:5432/shogen}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shogen}
      POSTGRES_USER: ${POSTGRES_USER:-shogen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shogen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shogen} -d ${POSTGRES_DB:-shogen}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
